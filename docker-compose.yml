version: '3.9'

services:
  web:
    build: .
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - .:/app

    ports:
      - "8000:8000"

    env_file:
      - .env

    depends_on:
      - db

  db:
    image: postgres:16

    environment:
      POSTGRES_DB: pastnow_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 12345

    ports:
      - "5433:5432"