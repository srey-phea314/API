<!-- REGISTER POPUP -->
<div id="registerModal" class="hidden fixed inset-0 bg-black bg-opacity-50 z-50">

    <div class="flex justify-center items-center h-full">

        <div class="bg-white p-8 rounded-lg shadow-lg w-96 relative">

            <!-- Close -->
            <button id="closeModal" class="absolute top-2 right-4 text-2xl font-bold hover:text-red-500">

                ×

            </button>

            <h1 class="text-2xl font-bold text-center mb-6 text-pink-700">
                Create Account
            </h1>

            <form>

                <input type="text" placeholder="Username" class="w-full border p-2 mb-4 rounded">

                <input type="email" placeholder="Email" class="w-full border p-2 mb-4 rounded">

                <input type="password" placeholder="Password" class="w-full border p-2 mb-4 rounded">

                <button type="submit" class="w-full bg-pink-700 text-white p-2 rounded">

                    Sign Up

                </button>

            </form>

        </div>

    </div>
</div>


<script>

    document.addEventListener(
        "DOMContentLoaded",
        () => {

            const registerBtn =
                document.getElementById(
                    "register-btn"
                );

            const registerModal =
                document.getElementById(
                    "registerModal"
                );

            const closeModal =
                document.getElementById(
                    "closeModal"
                );


            // OPEN
            registerBtn.addEventListener(
                "click",
                () => {

                    registerModal.classList.remove(
                        "hidden"
                    );

                }
            );


            // CLOSE
            closeModal.addEventListener(
                "click",
                () => {

                    registerModal.classList.add(
                        "hidden"
                    );

                }
            );


            // CLICK OUTSIDE
            registerModal.addEventListener(
                "click",
                (e) => {

                    if (
                        e.target === registerModal
                    ) {

                        registerModal.classList.add(
                            "hidden"
                        );

                    }

                });

        });

</script>
